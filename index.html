<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viral Engine V12 - Global Bypass</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(15, 15, 18, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }

        .neo-green { color: #22c55e; text-shadow: 0 0 10px rgba(34, 197, 94, 0.3); }
        .neo-pink { color: #ec4899; }
        
        .btn-primary {
            background: #4f46e5;
            box-shadow: 0 10px 30px -10px rgba(79, 70, 229, 0.8);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .btn-viral {
            background: linear-gradient(90deg, #db2777 0%, #4f46e5 100%);
            border-radius: 20px;
        }

        .animate-flicker {
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .bypass-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('auth');
            const [username, setUsername] = useState('');
            const [verified, setVerified] = useState(localStorage.getItem('v12_verified') === 'true');
            const [users, setUsers] = useState([
                { name: 'X_VIRAL', status: 'LIVE' },
                { name: 'LUIS_22', status: 'LIVE' },
                { name: 'TIK_MASTER', status: 'LIVE' }
            ]);

            const handleAuth = () => {
                if(username.length > 2) setView('dashboard');
            }

            const handleVerify = () => {
                window.open('https://www.tiktok.com/@z22', '_blank');
                setTimeout(() => {
                    setVerified(true);
                    localStorage.setItem('v12_verified', 'true');
                }, 5000);
            }

            if (view === 'auth') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 space-y-10 animate-flicker">
                    <div className="w-24 h-24 bg-indigo-600 rounded-3xl flex items-center justify-center shadow-[0_0_50px_rgba(79,70,229,0.4)]">
                         <svg xmlns="http://www.w3.org/2000/svg" className="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <div className="text-center">
                        <h1 className="text-4xl font-black uppercase italic tracking-tighter">Viral Engine</h1>
                        <p className="text-gray-500 text-[10px] font-bold tracking-[0.4em] mt-2 uppercase">Core Protocol V12</p>
                    </div>
                    <div className="w-full max-w-xs space-y-4">
                        <input 
                            type="text" 
                            placeholder="@USUARIO" 
                            className="w-full bg-[#0f0f12] border border-white/10 p-6 rounded-2xl text-center font-black text-2xl outline-none focus:border-indigo-500 transition-all"
                            value={username}
                            onChange={(e) => setUsername(e.target.value.toUpperCase())}
                        />
                        <button 
                            onClick={handleAuth}
                            className="w-full btn-primary py-6 text-xl font-black uppercase italic"
                        >
                            Enlazar Nodo
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-10">
                    {/* Header Estilo Captura 29699 */}
                    <header className="p-6 pt-10 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/80 backdrop-blur-md z-50">
                        <div className="space-y-0.5">
                            <p className="text-[9px] font-black neo-pink tracking-widest uppercase">Live Engine Active</p>
                            <div className="flex items-center gap-2">
                                <h2 className="text-2xl font-black italic tracking-tighter">@{username || 'Z22'}</h2>
                                <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                            </div>
                        </div>
                        <div className="flex gap-4">
                             <div className="text-right">
                                <p className="text-[8px] text-gray-500 font-bold uppercase">Nuevos</p>
                                <p className="text-xl font-black text-green-500">+{users.length * 12}</p>
                            </div>
                            <button className="bg-indigo-600 px-6 py-3 rounded-xl font-black text-sm uppercase italic shadow-lg active:scale-95 transition-all">
                                Iniciar Engine
                            </button>
                        </div>
                    </header>

                    <main className="p-6 space-y-6">
                        {/* Stats Estilo 29699 */}
                        <div className="grid grid-cols-2 gap-4">
                            <div className="glass-card p-6 relative overflow-hidden">
                                <p className="text-[10px] font-bold text-gray-500 uppercase mb-2">Retención</p>
                                <p className="text-4xl font-black neo-green italic">85%</p>
                            </div>
                            <div className="glass-card p-6 bg-gradient-to-br from-[#1a0b12] to-[#0f0f12]">
                                <p className="text-[10px] font-bold text-gray-500 uppercase mb-2 italic">Viral Mode</p>
                                <p className="text-2xl font-black italic uppercase">ON</p>
                            </div>
                        </div>

                        {/* Modo de Red Estilo 29701 */}
                        <div className="glass-card p-6 space-y-1">
                            <p className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Modo de Red</p>
                            <p className="text-4xl font-black italic tracking-tighter uppercase">Bypass V8</p>
                        </div>

                        <div className="glass-card p-6 space-y-1">
                            <p className="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Alcance Actual</p>
                            <p className="text-4xl font-black neo-green italic uppercase tracking-tighter">Global</p>
                        </div>

                        {/* Protocolos de Activación Estilo 29701 */}
                        <section className="space-y-4">
                            <div className="flex items-center gap-2 opacity-60">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8.111 16.404a5.5 5.5 0 117.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.252-3.905 14.157 0m-10.62 10.621a1 1 0 011.414 0l.017.017a1 1 0 010 1.414l-.017.017a1 1 0 01-1.414 0l-.017-.017a1 1 0 010-1.414l.017-.017z" />
                                </svg>
                                <h3 className="text-[10px] font-black uppercase tracking-[0.3em]">Protocolos de Activación</h3>
                            </div>

                            {!verified ? (
                                <button 
                                    onClick={handleVerify}
                                    className="w-full bg-indigo-600/20 border border-indigo-500/30 p-8 rounded-[2rem] flex items-center justify-between group active:scale-95 transition-all"
                                >
                                    <div className="flex items-center gap-6">
                                        <div className="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-black">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" viewBox="0 0 20 20" fill="currentColor">
                                                <path fillRule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clipRule="evenodd" />
                                            </svg>
                                        </div>
                                        <div className="text-left">
                                            <p className="text-xl font-black italic uppercase leading-none mb-1">Paso 1: Follow Maestro</p>
                                            <p className="text-[10px] text-gray-400 font-medium">Haz clic para seguir a @Z22 en TikTok</p>
                                        </div>
                                    </div>
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-white/20 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                    </svg>
                                </button>
                            ) : (
                                <div className="w-full bg-green-500/10 border border-green-500/30 p-8 rounded-[2rem] flex items-center gap-6 animate-in zoom-in duration-500">
                                    <div className="w-14 h-14 bg-green-500 rounded-2xl flex items-center justify-center text-black shadow-[0_0_20px_rgba(34,197,94,0.4)]">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8" viewBox="0 0 20 20" fill="currentColor">
                                            <path d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2H7V7a3 3 0 016 0v2h2V7a5 5 0 00-5-5z" />
                                        </svg>
                                    </div>
                                    <div className="text-left">
                                        <p className="text-2xl font-black neo-green italic uppercase leading-none mb-1">Nodo Verificado</p>
                                        <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Algoritmo Desbloqueado</p>
                                    </div>
                                </div>
                            )}
                        </section>

                        {/* Live Activity Estilo 29702 */}
                        <section className="space-y-4">
                            <div className="flex justify-between items-center opacity-60">
                                <p className="text-[10px] font-black uppercase tracking-[0.3em] italic flex items-center gap-2">
                                    <span className="w-1.5 h-1.5 bg-pink-500 rounded-full"></span>
                                    Red de Seguidores en Tiempo Real
                                </p>
                                <p className="text-[9px] font-black text-pink-500 uppercase">Live</p>
                            </div>
                            
                            <div className="glass-card min-h-[160px] flex flex-col items-center justify-center p-10 text-center space-y-4 border-dashed border-white/10">
                                {verified ? (
                                    <div className="w-full space-y-3">
                                        {users.map((u, i) => (
                                            <div key={i} className="flex items-center justify-between bg-white/5 p-4 rounded-xl border border-white/5">
                                                <p className="font-black italic">@{u.name}</p>
                                                <span className="text-[8px] font-black bg-green-500/20 text-green-500 px-2 py-1 rounded uppercase tracking-widest">Conectado</span>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <>
                                        <p className="text-gray-600 font-black italic uppercase tracking-widest text-sm">Esperando nuevos nodos...</p>
                                    </>
                                )}
                            </div>
                        </section>

                        {/* Botón Acción Final 29699 */}
                        <button className="w-full btn-viral py-8 text-xl font-black uppercase italic shadow-2xl flex items-center justify-center gap-3">
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2H7a2 2 0 01-2-2V5z" />
                            </svg>
                            Lanzar Meta Live
                        </button>

                        {/* Tip IA Estilo 29699 */}
                        <div className="glass-card p-8 space-y-3">
                            <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Tip de IA</p>
                            <p className="text-xs text-gray-400 leading-relaxed font-medium italic">
                                "Detectamos que la velocidad de red es óptima. Mantén la sesión activa para maximizar tu posición en el algoritmo global."
                            </p>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
