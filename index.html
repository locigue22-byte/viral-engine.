<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viral Engine V12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background: #000000;
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: #0d0d0f;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
        }

        .neo-green { color: #22c55e; }
        
        .btn-viral {
            background: linear-gradient(90deg, #5249f3 0%, #eb4696 100%);
            border-radius: 24px;
            box-shadow: 0 10px 30px -5px rgba(82, 73, 243, 0.4);
            transition: all 0.2s ease;
        }

        .btn-viral:active { transform: scale(0.95); }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 12px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .verify-gradient {
            background: linear-gradient(135deg, #0d1a13 0%, #050505 100%);
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: none; /* Oculto por defecto */
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto min-h-screen p-6 pb-24 space-y-7">
        <!-- Header -->
        <div class="flex justify-between items-start pt-6">
            <div class="space-y-1">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.2em]">Nodo Online</span>
                    <div class="pulse-dot"></div>
                </div>
                <h1 class="text-4xl font-black italic tracking-tighter uppercase leading-none">@z22</h1>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Global Ops</p>
                <p class="text-4xl font-black text-white italic">128 <span class="text-orange-500 text-2xl">🔥</span></p>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="space-y-4">
            <div class="glass-card p-8 relative overflow-hidden shimmer">
                <p class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.3em] mb-1">Motor del Sistema</p>
                <div class="flex justify-between items-center">
                    <h2 class="text-4xl font-black italic uppercase tracking-tighter">Bypass V8</h2>
                    <div class="p-3 bg-indigo-500/10 rounded-2xl border border-indigo-500/20 text-indigo-400">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-6 border-l-2 border-l-green-500/30">
                    <p class="text-[10px] font-black text-gray-500 uppercase mb-2">Retención</p>
                    <p class="text-4xl font-black neo-green italic">98%</p>
                </div>
                <div class="glass-card p-6 border-l-2 border-l-indigo-500/30">
                    <p class="text-[10px] font-black text-gray-500 uppercase mb-2 italic">Modo</p>
                    <p class="text-3xl font-black italic uppercase leading-none">VIP</p>
                </div>
            </div>
        </div>

        <!-- Botones de Acción -->
        <div id="activation-area">
            <button id="step1-btn" onclick="handleVerify()" class="w-full bg-[#5249f3] p-6 rounded-[35px] flex items-center justify-between shadow-2xl transition-all">
                <div class="flex items-center gap-5 text-left">
                    <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center text-black shadow-xl">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    </div>
                    <div class="space-y-0.5">
                        <p class="text-[18px] font-black italic uppercase leading-none text-white">Paso 1: Activar</p>
                        <p class="text-[10px] opacity-80 font-medium italic text-white/80">Sigue a @z22 en TikTok</p>
                    </div>
                </div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>

            <div id="verified-msg" class="verify-gradient p-7 rounded-[35px] items-center gap-5 shadow-[0_0_50px_rgba(34,197,94,0.15)]">
                <div class="w-14 h-14 bg-green-500 rounded-2xl flex items-center justify-center text-black">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <div class="text-left">
                    <p class="text-[24px] font-black neo-green italic uppercase leading-none">Verificado</p>
                    <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest mt-1 italic">Acceso Concedido</p>
                </div>
            </div>
        </div>

        <!-- Feed Live -->
        <div class="space-y-4 pt-4">
            <div class="flex justify-between items-center px-2">
                <p class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] italic flex items-center gap-2">
                    Actividad Global
                    <span class="w-1.5 h-1.5 bg-pink-500 rounded-full animate-pulse"></span>
                </p>
                <div class="px-3 py-1 bg-pink-500/10 text-pink-500 text-[10px] font-black rounded-full border border-pink-500/20 uppercase">Live</div>
            </div>
            <div class="glass-card h-40 flex flex-col items-center justify-center border-dashed border-white/10 relative overflow-hidden">
                <div class="absolute inset-0 shimmer opacity-20"></div>
                <p class="text-[11px] font-black italic uppercase tracking-[0.4em] text-white/40">Buscando nuevos perfiles...</p>
            </div>
        </div>

        <button class="w-full btn-viral py-7 text-[13px] font-black uppercase tracking-[0.2em] italic flex items-center justify-center gap-3 text-white">
            Generar mi enlace VIP
        </button>
    </div>

    <script>
        function handleVerify() {
            window.open('https://www.tiktok.com/@z22', '_blank');
            setTimeout(() => {
                document.getElementById('step1-btn').style.display = 'none';
                document.getElementById('verified-msg').style.display = 'flex';
            }, 3000);
        }
    </script>
</body>
</html>
